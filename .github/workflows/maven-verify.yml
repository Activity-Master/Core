name: Maven Verify
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Maven Verify
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      JWT_TEST_TOKEN: ${{ secrets.JWT_TEST_TOKEN }}
      TEST_DB_CONTAINER_IMAGE: ${{ secrets.TEST_DB_CONTAINER_IMAGE }}
      OAUTH2_ISSUER_URL: ${{ secrets.OAUTH2_ISSUER_URL }}
      JWKS_URI: ${{ secrets.JWKS_URI }}
      PORT: 8080
      ENVIRONMENT: ci
      ENABLE_DEBUG_LOGS: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Maven verify
        run: mvn -B verify
